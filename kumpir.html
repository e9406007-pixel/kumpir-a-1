<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kumpir AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090f; --surface:#0e1118; --surface2:#161b27; --surface3:#1e2535;
  --border:rgba(255,255,255,0.07);
  --accent:#3b82f6; --ab:#60a5fa; --a2:#a78bfa; --a3:#34d399; --a4:#f59e0b; --a5:#f472b6;
  --text:#eef2ff; --text2:#8892aa; --text3:#4a5268;
  --chat-bg: none;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
.shell{display:flex;flex-direction:column;height:100%;height:100dvh;position:relative;z-index:1}
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0}

/* HEADER */
header{height:54px;min-height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.9);backdrop-filter:blur(20px);flex-shrink:0;z-index:100;position:relative}
.hleft{display:flex;align-items:center;gap:9px}
.menu-btn{width:34px;height:34px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:19px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.menu-btn:active{background:var(--surface2)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--a2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 16px rgba(59,130,246,.4);flex-shrink:0}
.logo span{background:linear-gradient(135deg,var(--ab),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border)}
.sdot{width:6px;height:6px;background:var(--a3);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}

/* SIDEBAR */
.body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:rgba(7,9,15,.8);backdrop-filter:blur(20px);display:flex;flex-direction:column;padding:12px 10px;gap:3px;overflow-y:auto;transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:50}
.slabel{font-size:9.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);padding:8px 10px 5px;font-family:'Syne',sans-serif}
.sbtn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:.16s;text-align:left;width:100%;white-space:nowrap}
.sbtn:active,.sbtn:hover{background:var(--surface2);color:var(--text)}
.sbtn.active{background:var(--surface2);border-color:var(--border);color:var(--text)}
.sbtn.active[data-s="genel"]{border-left:3px solid var(--accent)}
.sbtn.active[data-s="gorsel"]{border-left:3px solid #f43f5e}
.sbtn.active[data-s="matematik"]{border-left:3px solid var(--a4)}
.sbtn.active[data-s="planlama"]{border-left:3px solid var(--a3)}
.sbtn.active[data-s="kodlama"]{border-left:3px solid var(--a2)}
.sbtn.active[data-s="hizli"]{border-left:3px solid var(--a5)}
.sbtn.active[data-s="dil"]{border-left:3px solid #fbbf24}
.sbtn.active[data-s="ayarlar"]{border-left:3px solid var(--text2)}
.sicon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sfooter{margin-top:auto;padding:10px 10px 4px;border-top:1px solid var(--border);font-size:10.5px;color:var(--text3);text-align:center;line-height:1.6}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:49}
.overlay.show{display:block}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
.sec-header{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.5);backdrop-filter:blur(10px);flex-shrink:0;min-height:40px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:30px;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 12px 8px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
.msg{display:flex;gap:9px;animation:msgIn .26s cubic-bezier(.34,1.4,.64,1);max-width:100%}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:88%}
.msg.ai{max-width:94%}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.msg.ai .avatar{background:linear-gradient(135deg,var(--accent),var(--a2));box-shadow:0 0 10px rgba(59,130,246,.3)}
.msg.user .avatar{background:var(--surface3);border:1px solid var(--border)}
.msg-inner{display:flex;flex-direction:column;min-width:0}
.msg.user .msg-inner{align-items:flex-end}
.mname{font-size:9.5px;font-weight:700;letter-spacing:.5px;margin-bottom:3px;font-family:'Syne',sans-serif;text-transform:uppercase}
.msg.ai .mname{color:var(--ab)}
.msg.user .mname{color:var(--text3)}
.bubble{padding:10px 13px;border-radius:13px;font-size:13.5px;line-height:1.65;word-break:break-word;overflow-wrap:anywhere}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 13px 13px 13px}
.msg.user .bubble{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(167,139,250,.12));border:1px solid rgba(59,130,246,.25);border-radius:13px 4px 13px 13px}
.bubble pre{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:10px;margin:7px 0;overflow-x:auto;font-size:12px;line-height:1.55;font-family:'Courier New',monospace}
.bubble code{background:rgba(255,255,255,.08);padding:2px 5px;border-radius:4px;font-family:'Courier New',monospace;font-size:12px}
.bubble pre code{background:transparent;padding:0}
.bubble strong{color:var(--ab);font-weight:600}
.bubble em{color:var(--a2)}
.gen-img{max-width:260px;border-radius:12px;border:1px solid var(--border);margin-top:6px;display:block}
.vision-thumb{max-width:160px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;display:block}
.speak-btn{background:none;border:none;cursor:pointer;font-size:14px;margin-top:4px;opacity:.5;transition:.2s;padding:2px}
.speak-btn:hover{opacity:1}

/* TYPING */
.tdots{display:flex;gap:5px;align-items:center;padding:8px 12px}
.tdot{width:7px;height:7px;border-radius:50%;animation:tb 1.2s ease-in-out infinite}
.tdot:nth-child(1){background:var(--accent)}
.tdot:nth-child(2){background:var(--a2);animation-delay:.2s}
.tdot:nth-child(3){background:var(--a3);animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-7px);opacity:1}}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;text-align:center;padding:20px 14px}
.wicon{font-size:44px;filter:drop-shadow(0 0 18px rgba(59,130,246,.45));animation:float 3.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.welcome h2{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:var(--text3);font-size:12.5px;max-width:290px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:4px;max-width:320px}
.chip{padding:6px 12px;border-radius:30px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:11.5px;cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif;-webkit-user-select:none}
.chip:active{background:var(--surface2);color:var(--text);transform:scale(.96)}

/* INPUT */
.input-area{padding:8px 11px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));background:rgba(7,9,15,.94);backdrop-filter:blur(24px);border-top:1px solid var(--border);flex-shrink:0}
.img-preview-bar{display:none;padding:5px 11px;background:var(--surface);border-top:1px solid var(--border)}
.img-preview-inner{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.img-preview-inner img{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
.rm-img{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}
.irow{display:flex;align-items:flex-end;gap:6px;max-width:760px;margin:0 auto}
.ibox{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;resize:none;min-height:44px;max-height:110px;line-height:1.5;transition:border-color .2s,box-shadow .2s;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ibox::placeholder{color:var(--text3)}
.ibox:focus{border-color:rgba(59,130,246,.4);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.ibtns{display:flex;gap:5px;flex-shrink:0}
.ibtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text2);transition:.15s;flex-shrink:0}
.ibtn:active{transform:scale(.92)}
.mic-btn.on{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.5);color:#ef4444;animation:mp 1s ease-in-out infinite}
@keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.send-btn{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--a2));border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;transition:.15s;box-shadow:0 3px 12px rgba(59,130,246,.35);flex-shrink:0}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.ifooter{text-align:center;margin-top:4px;font-size:10px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:8px}
.vstat{color:#ef4444;display:none}
.vstat.show{display:inline}

/* SETTINGS */
.set-panel{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;animation:modalIn .25s cubic-bezier(.34,1.4,.64,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.modal-close:hover{background:var(--surface2)}
.modal-body{overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;flex:1}

/* QUICK SETTINGS BAR */
.quick-bar{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border);background:rgba(7,9,15,.5);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.quick-bar::-webkit-scrollbar{display:none}
.qbtn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:.15s;flex-shrink:0}
.qbtn:hover,.qbtn:active{background:var(--surface3);color:var(--text)}
.set-sec{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.set-title{padding:10px 14px 8px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);gap:12px}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:13px;font-weight:500}
.set-sub{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{width:42px;height:23px;border-radius:12px;background:var(--surface3);border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle::after{content:'';position:absolute;width:17px;height:17px;border-radius:50%;background:white;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on{background:var(--accent)}
.toggle.on::after{transform:translateX(19px)}
.sel-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);gap:8px}
.sel-row:last-child{border-bottom:none}
.sel-row select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;max-width:160px}
.style-opts{display:flex;flex-direction:column;gap:1px;padding:5px 8px 8px}
.sopt{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:9px;cursor:pointer;transition:.14s;border:1px solid transparent}
.sopt:active{background:var(--surface2)}
.sopt.sel{background:var(--surface2);border-color:rgba(59,130,246,.3)}
.sopt-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.sopt-name{font-size:13px;font-weight:600}
.sopt-desc{font-size:11px;color:var(--text3);margin-top:1px}
.sopt-chk{width:17px;height:17px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:9px;color:white;flex-shrink:0;margin-left:auto}
.sopt.sel .sopt-chk{display:flex}

/* THEMES GRID */
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 12px}
.tcard{border-radius:10px;cursor:pointer;overflow:hidden;border:2px solid transparent;transition:.2s;aspect-ratio:1;position:relative}
.tcard.sel{border-color:var(--accent)}
.tcard:active{transform:scale(.94)}
.tcard-inner{width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:4px}
.tcard-name{font-size:9px;font-weight:700;color:white;text-shadow:0 1px 3px rgba(0,0,0,.7);text-align:center;line-height:1.2;font-family:'Syne',sans-serif}

/* RESPONSIVE */
@media(max-width:640px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;transform:translateX(-100%);z-index:200;padding-top:62px;padding-bottom:env(safe-area-inset-bottom,0)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.4)}
}
@media(min-width:641px){.menu-btn{display:none}}
@media(max-width:380px){.bubble{font-size:13px}.ibox{font-size:13px}}
</style>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>
<div class="shell">

<header>
  <div class="hleft">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="logo">
      <div class="logo-icon">🥔</div>
      <div>Kumpir <span>AI</span></div>
    </div>
  </div>
  <div class="status-pill"><div class="sdot"></div><span>Çevrimiçi</span></div>
</header>

<div class="body">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="slabel">Bölümler</div>
    <button class="sbtn active" data-s="genel" onclick="sw(this)"><span class="sicon">🌐</span>Genel Sohbet</button>
    <button class="sbtn" data-s="matematik" onclick="sw(this)"><span class="sicon">🧮</span>Matematik</button>
    <button class="sbtn" data-s="planlama" onclick="sw(this)"><span class="sicon">🗂️</span>Planlı Düşünme</button>
    <button class="sbtn" data-s="kodlama" onclick="sw(this)"><span class="sicon">💻</span>Kodlama</button>
    <button class="sbtn" data-s="hizli" onclick="sw(this)"><span class="sicon">⚡</span>Hızlı Düşünme</button>
    <button class="sbtn" data-s="gorsel" onclick="sw(this)"><span class="sicon">🎨</span>Görsel Oluştur</button>
    <button class="sbtn" data-s="dil" onclick="sw(this)"><span class="sicon">🌍</span>Dil & Çeviri</button>
    <div class="slabel" style="margin-top:6px">Diğer</div>
    <button class="sbtn" data-s="ayarlar" onclick="sw(this)"><span class="sicon">⚙️</span>Ayarlar</button>
    <div class="sfooter">🥔 Kumpir AI<br>Enes tarafından yapıldı</div>
  </aside>

  <div class="chat-area">
    <div class="sec-header">
      <div class="badge" id="badge" style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#60a5fa">🌐 Genel Sohbet</div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="wicon">🥔</div>
        <h2>Merhaba! Ben Kumpir.</h2>
        <p>Her şeyi bilen yapay zeka asistanın. Bölüm seç ya da hemen sor!</p>
        <div class="chips">
          <div class="chip" onclick="sendChip(this)">Selam! Nasılsın?</div>
          <div class="chip" onclick="sendChip(this)">15 × 27 = ?</div>
          <div class="chip" onclick="sendChip(this)">Araba fotoğrafı oluştur</div>
          <div class="chip" onclick="sendChip(this)">Kod yaz</div>
        </div>
      </div>
    </div>

    <div id="quickBar" style="display:none;gap:6px;padding:8px 14px;border-top:1px solid var(--border);background:rgba(7,9,15,.5);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none">
      <button style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0" onclick="openModal('themes')">🎨 Temalar</button>
      <button style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0" onclick="openModal('tts')">🔊 Ses</button>
      <button style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0" onclick="openModal('style')">💬 Tarz</button>
      <button style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0" onclick="toggleTheme()">🌙 Tema</button>
      <button style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0" onclick="sw(document.querySelector('[data-s=ayarlar]'))">⚙️ Ayarlar</button>
    </div>

    <div class="img-preview-bar" id="imgPreviewBar">
      <div class="img-preview-inner">
        <img id="imgThumb" src="" alt="">
        <span id="imgName"></span>
        <button class="rm-img" onclick="removeImg()">✕</button>
      </div>
    </div>

    <div class="input-area" id="inputArea">

function applyTheme() {
  // Dark/light
  document.body.classList.toggle('light', CFG.theme==='light');
  // Chat theme
  const t = CHAT_THEMES[CFG.chatTheme] || CHAT_THEMES.default;
  const layer = document.getElementById('bgLayer');
  // Apply CSS vars
  const root = document.documentElement;
  // Reset first
  ['--bg','--surface','--surface2','--accent','--a2'].forEach(v => root.style.removeProperty(v));
  if(t.css) {
    t.css.split(';').forEach(pair => {
      const [k,v] = pair.split(':');
      if(k&&v) root.style.setProperty(k.trim(), v.trim());
    });
  }
  // Background layer
  let layerStyle = '';
  if(t.bg) layerStyle += `background: ${t.bg};`;
  if(t.pattern) layerStyle += `background-image: ${t.pattern};`;
  layer.style.cssText = layerStyle;
}

      if(m.type==='img') renderImg(m.url,m.prompt);
      else renderMsg(m.role==='user'?'user':'ai', m.content, m.thumb);

}

// ── RENDER MESSAGE ──
function renderMsg(type, text, thumb){
  document.getElementById('welcome')?.remove();
  const msgs=document.getElementById('messages');
  const d=document.createElement('div');
  d.className=`msg ${type}`;
  const thumbHtml = thumb ? `<img src="${thumb}" class="vision-thumb" alt="yüklenen görsel">` : '';
  d.innerHTML=`
    <div class="avatar">${type==='ai'?'🥔':'👤'}</div>
    <div class="msg-inner">
      <div class="mname">${type==='ai'?'Kumpir AI':'Sen'}</div>
      <div class="bubble">${thumbHtml}${fmtText(text)}</div>
      ${type==='ai'&&CFG.tts?`<button class="speak-btn" onclick="speak(this,'${encodeURIComponent(text)}')">🔊</button>`:''}
    </div>`;
  msgs.appendChild(d);
  msgs.scrollTop=99999;
}

function renderImg(url, prompt){
  document.getElementById('welcome')?.remove();
  const msgs=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg ai';
  const id='img'+Date.now();
  d.innerHTML=`
    <div class="avatar">🥔</div>
    <div class="msg-inner">
      <div class="mname">Kumpir AI</div>
      <div class="bubble">
        <div style="font-size:11.5px;color:var(--text3);margin-bottom:6px">🎨 "${prompt}"</div>
        <div id="${id}_l" style="color:var(--text3);font-size:12px">⏳ Görsel yükleniyor, bekle...</div>
        <img id="${id}" src="${url}" class="gen-img" style="display:none"
          onload="this.style.display='block';document.getElementById('${id}_l').style.display='none';document.getElementById('messages').scrollTop=99999"
          onerror="document.getElementById('${id}_l').textContent='❌ Görsel yüklenemedi. Tekrar dene.'">
      </div>
    </div>`;
  msgs.appendChild(d);
  msgs.scrollTop=99999;
}

function fmtText(t){
  t=t.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${esc(c.trim())}</code></pre>`);
  t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.*?)\*/g,'<em>$1</em>');
  t=t.replace(/\n/g,'<br>');
  return t;
}
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

}

// ── IMAGE UPLOAD ──
function handleImgUpload(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    const dataUrl=ev.target.result;
    uploadedImg={base64:dataUrl.split(',')[1], mimeType:f.type, dataUrl};
    document.getElementById('imgThumb').src=dataUrl;
    document.getElementById('imgName').textContent=f.name;
    document.getElementById('imgPreviewBar').style.display='block';
  };
  r.readAsDataURL(f);
  e.target.value='';
}
function removeImg(){ uploadedImg=null; document.getElementById('imgPreviewBar').style.display='none'; }

// ── IMAGE KEYWORDS ──
const IMG_KW=['fotoğraf','görsel','resim','çizim','oluştur','yap','çiz','üret','illüstrasyon'];
const IMG_OBJ=['araba','kedi','köpek','at','kuş','ev','ağaç','dağ','deniz','uzay','insan','hayvan','manzara','çiçek','şehir','robot','ejderha','orman','göl','şelale','aslan','kaplan','balık','ay','güneş','yıldız'];
const isImgReq=t=>IMG_KW.some(k=>t.toLowerCase().includes(k))&&(cur==='gorsel'||IMG_OBJ.some(k=>t.toLowerCase().includes(k)));

// ── SEND ──
async function send(){
  if(loading||cur==='ayarlar') return;
  const inp=document.getElementById('ibox');
  const text=inp.value.trim();
  if(!text&&!uploadedImg) return;

  inp.value=''; inp.style.height='auto';
  loading=true;
  document.getElementById('sendBtn').disabled=true;

  document.getElementById('welcome')?.remove();
  const msgs=document.getElementById('messages');

  // User bubble
  const ud=document.createElement('div');
  ud.className='msg user';
  const thumbHtml=uploadedImg?`<img src="${uploadedImg.dataUrl}" class="vision-thumb" alt="">`:'' ;
  ud.innerHTML=`<div class="avatar">👤</div><div class="msg-inner"><div class="mname" style="color:var(--text3)">Sen</div><div class="bubble">${thumbHtml}${text?esc(text):''}</div></div>`;
  msgs.appendChild(ud);
  msgs.scrollTop=99999;

  if(!hist[cur]) hist[cur]=[];
  hist[cur].push({role:'user', content:text||'(Görsel paylaşıldı)', thumb:uploadedImg?.dataUrl});

  showTyping();

  // Vision (uploaded image)
  if(uploadedImg){
    const img={...uploadedImg};
    removeImg();
    try{
      const r=await fetch('/api/vision',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          imageBase64:img.base64, mimeType:img.mimeType,
          question:text||'Bu görseli Türkçe olarak detaylıca açıkla.',
          system:`Sen Kumpir adında bir yapay zeka asistanısın. SADECE TÜRKÇE konuş. Görseli analiz et ve Türkçe açıkla. ${STYLES[CFG.style].p}`
        })
      });
      const data=await r.json();
      removeTyping();
      const reply=data.content?.[0]?.text||'Görseli analiz edemedim.';
      hist[cur].push({role:'ai',content:reply});
      renderMsg('ai',reply);
      if(CFG.tts) speakText(reply);
    }catch(e){
      removeTyping();
      renderMsg('ai','Görsel analiz hatası: '+e.message);
    }
    loading=false; document.getElementById('sendBtn').disabled=false;
    return;
  }

  // Image generation
  if(isImgReq(text)){
    try{
      const tr=await fetch('/api/chat',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          max_tokens:60,
          system:'Translate the following Turkish image description to English for image generation. Return ONLY the English prompt, nothing else.',
          messages:[{role:'user',content:text}]
        })
      });
      const td=await tr.json();
      const eng=((td.content?.[0]?.text)||text).trim().replace(/['".,!?]/g,'').substring(0,200);
      const encoded=encodeURIComponent(eng+', digital art, vibrant colors, high quality, detailed illustration');
      const seed=Math.floor(Math.random()*99999);
      const imageUrl=`https://image.pollinations.ai/prompt/${encoded}?width=512&height=512&nologo=true&seed=${seed}`;
      removeTyping();
      hist[cur].push({type:'img',url:imageUrl,prompt:eng});
      renderImg(imageUrl,eng);
      const reply='Görsel oluşturuluyor, yüklenmesi biraz sürebilir! 🎨';
      hist[cur].push({role:'ai',content:reply});
    }catch(e){
      removeTyping();
      renderMsg('ai','Görsel hatası: '+e.message);
    }
    loading=false; document.getElementById('sendBtn').disabled=false;
    return;
  }

  // Normal chat
  const sec=SECS[cur];
  try{
    const apiMsgs=(hist[cur]||[]).slice(-14).filter(m=>m.role).map(m=>({
      role:m.role==='ai'?'assistant':'user',
      content:typeof m.content==='string'?m.content:'(görsel)'
    }));
    const r=await fetch('/api/chat',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({max_tokens:600, system:sec.sys(), messages:apiMsgs})
    });
    const data=await r.json();
    removeTyping();
    const reply=data.content?.[0]?.text||'Bir sorun oluştu.';
    hist[cur].push({role:'ai',content:reply});
    renderMsg('ai',reply);
    if(CFG.tts) speakText(reply);
  }catch(e){
    removeTyping();
    renderMsg('ai','Bağlantı hatası: '+e.message);
  }
  loading=false; document.getElementById('sendBtn').disabled=false;
}

// ── TTS ──
function speakText(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean=text.replace(/<[^>]+>/g,'').replace(/[*`#]/g,'');
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='tr-TR';
  u.rate=CFG.ttsRate||1;
  const voices=window.speechSynthesis.getVoices();
  const trVoices=voices.filter(v=>v.lang.startsWith('tr'));
  if(trVoices.length>0){
    const pref=CFG.ttsVoice==='male'?trVoices.find(v=>v.name.toLowerCase().includes('male')||v.name.toLowerCase().includes('erkek')):trVoices.find(v=>v.name.toLowerCase().includes('female')||v.name.toLowerCase().includes('kadın'));
    u.voice=pref||trVoices[0];
  }
  window.speechSynthesis.speak(u);
}

function speak(btn, encoded){
  const text=decodeURIComponent(encoded);
  if(window.speechSynthesis.speaking){ window.speechSynthesis.cancel(); return; }
  speakText(text);
}

// ── MIC ──
function toggleMic(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Sesli giriş için Chrome kullan!');return;}
  if(listening){ recog?.stop(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR(); recog.lang='tr-TR'; recog.continuous=false; recog.interimResults=true;
  recog.onstart=()=>{ listening=true; document.getElementById('micBtn').classList.add('on'); document.getElementById('micBtn').textContent='⏹️'; document.getElementById('vstat').classList.add('show'); };
  recog.onresult=e=>{ const t=Array.from(e.results).map(r=>r[0].transcript).join(''); document.getElementById('ibox').value=t; autoResize(document.getElementById('ibox')); };
  recog.onend=()=>{ listening=false; document.getElementById('micBtn').classList.remove('on'); document.getElementById('micBtn').textContent='🎤'; document.getElementById('vstat').classList.remove('show'); const v=document.getElementById('ibox').value.trim(); if(v) send(); };
  recog.onerror=()=>{ listening=false; document.getElementById('micBtn').classList.remove('on'); document.getElementById('micBtn').textContent='🎤'; document.getElementById('vstat').classList.remove('show'); };
  recog.start();
}

function sendChip(el){ document.getElementById('ibox').value=el.textContent; send(); }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

        let patStyle='';
