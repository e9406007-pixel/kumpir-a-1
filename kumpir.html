<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kumpir AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--surface:#0e1118;--surface2:#161b27;--surface3:#1e2535;
  --border:rgba(255,255,255,0.07);
  --accent:#3b82f6;--ab:#60a5fa;--a2:#a78bfa;--a3:#34d399;--a4:#f59e0b;--a5:#f472b6;
  --text:#eef2ff;--text2:#8892aa;--text3:#4a5268;
}
.light{--bg:#f0f4ff;--surface:#fff;--surface2:#e8eef8;--surface3:#dde5f5;--border:rgba(0,0,0,.08);--text:#1a1f36;--text2:#5a6180;--text3:#9aa0b8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}

/* BG LAYER */
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;transition:all .5s}

/* ── ONBOARDING ── */
.onboard{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#050810 0%,#0a0f1e 50%,#050810 100%)}
.onboard-bg{position:absolute;inset:0;overflow:hidden}
.onboard-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:rgba(59,130,246,.2);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:300px;height:300px;background:rgba(167,139,250,.15);bottom:-80px;right:-80px;animation-delay:3s}
.orb3{width:200px;height:200px;background:rgba(52,211,153,.1);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1.5s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-20px) scale(1.1)}}
.orb3{animation:orbFloat3 6s ease-in-out infinite}
@keyframes orbFloat3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(calc(-50% + 15px),calc(-50% - 15px)) scale(1.15)}}

.onboard-card{position:relative;z-index:1;text-align:center;padding:40px 32px;max-width:420px;width:90%;animation:cardIn .8s cubic-bezier(.34,1.2,.64,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:none}}

.ob-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.ob-avatar{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#3b82f6,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 40px rgba(59,130,246,.5),0 20px 60px rgba(0,0,0,.4);animation:avatarPulse 3s ease-in-out infinite}
@keyframes avatarPulse{0%,100%{box-shadow:0 0 40px rgba(59,130,246,.5),0 20px 60px rgba(0,0,0,.4)}50%{box-shadow:0 0 60px rgba(59,130,246,.8),0 20px 60px rgba(0,0,0,.4)}}

.ob-tagline{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:6px;letter-spacing:2px;text-transform:uppercase;font-family:'Syne',sans-serif}

.ob-title{font-family:'Syne',sans-serif;font-weight:800;font-size:38px;line-height:1.1;margin-bottom:6px}
.ob-title .t-blue{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ob-sub{font-size:15px;color:rgba(255,255,255,.5);margin-bottom:32px;line-height:1.6}

.ob-phrase{font-size:14px;color:rgba(255,255,255,.35);margin-bottom:28px;font-style:italic;min-height:20px;transition:opacity .4s}

.ob-input-wrap{position:relative;margin-bottom:16px}
.ob-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:16px 20px;font-size:16px;color:white;outline:none;font-family:'DM Sans',sans-serif;transition:all .2s;text-align:center}
.ob-input::placeholder{color:rgba(255,255,255,.3)}
.ob-input:focus{border-color:rgba(59,130,246,.6);background:rgba(59,130,246,.08);box-shadow:0 0 0 3px rgba(59,130,246,.15)}

.ob-btn{width:100%;padding:16px;background:linear-gradient(135deg,#3b82f6,#a78bfa);border:none;border-radius:16px;color:white;font-size:16px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;box-shadow:0 8px 30px rgba(59,130,246,.4)}
.ob-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(59,130,246,.5)}
.ob-btn:active{transform:scale(.97)}
.ob-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

.ob-dots{display:flex;gap:6px;justify-content:center;margin-top:24px}
.ob-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2)}
.ob-dot.active{background:var(--accent);width:20px;border-radius:3px;transition:width .3s}

/* ── SHELL ── */
.shell{display:flex;flex-direction:column;height:100%;height:100dvh;position:relative;z-index:1}

/* HEADER */
header{height:54px;min-height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.9);backdrop-filter:blur(20px);flex-shrink:0;z-index:100;position:relative}
.light header{background:rgba(240,244,255,.95)}
.hleft{display:flex;align-items:center;gap:9px}
.menu-btn{width:34px;height:34px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:19px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.menu-btn:active{background:var(--surface2)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px}
.logo-avatar{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--a2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;box-shadow:0 0 14px rgba(59,130,246,.4)}
.logo span{background:linear-gradient(135deg,var(--ab),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hright{display:flex;align-items:center;gap:8px}
.user-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:11px;color:var(--text2)}
.user-badge .uavatar{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--a2));display:flex;align-items:center;justify-content:center;font-size:9px;color:white;font-weight:700}
.status-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border)}
.sdot{width:6px;height:6px;background:var(--a3);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}

/* SIDEBAR */
.body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:rgba(7,9,15,.8);backdrop-filter:blur(20px);display:flex;flex-direction:column;padding:12px 10px;gap:3px;overflow-y:auto;transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:50}
.light .sidebar{background:rgba(240,244,255,.9)}
.slabel{font-size:9.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);padding:8px 10px 5px;font-family:'Syne',sans-serif}
.sbtn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:.16s;text-align:left;width:100%;white-space:nowrap}
.sbtn:active,.sbtn:hover{background:var(--surface2);color:var(--text)}
.sbtn.active{background:var(--surface2);border-color:var(--border);color:var(--text)}
.sbtn.active[data-s="genel"]{border-left:3px solid var(--accent)}
.sbtn.active[data-s="matematik"]{border-left:3px solid var(--a4)}
.sbtn.active[data-s="planlama"]{border-left:3px solid var(--a3)}
.sbtn.active[data-s="kodlama"]{border-left:3px solid var(--a2)}
.sbtn.active[data-s="hizli"]{border-left:3px solid var(--a5)}
.sbtn.active[data-s="spor"]{border-left:3px solid #4ade80}
.sbtn.active[data-s="dil"]{border-left:3px solid #fbbf24}
.sbtn.active[data-s="ayarlar"]{border-left:3px solid var(--text2)}
.sicon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sfooter{margin-top:auto;padding:10px 10px 4px;border-top:1px solid var(--border);font-size:10.5px;color:var(--text3);text-align:center;line-height:1.6}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:49}
.overlay.show{display:block}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
.sec-header{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.5);backdrop-filter:blur(10px);flex-shrink:0;min-height:40px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:30px;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 12px 8px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
.msg{display:flex;gap:9px;animation:msgIn .26s cubic-bezier(.34,1.4,.64,1);max-width:100%}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:88%}
.msg.ai{max-width:94%}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.msg.ai .avatar{background:linear-gradient(135deg,var(--accent),var(--a2));box-shadow:0 0 10px rgba(59,130,246,.3)}
.msg.user .avatar{background:var(--surface3);border:1px solid var(--border);font-size:10px;font-weight:700;color:var(--ab);font-family:'Syne',sans-serif}
.msg-inner{display:flex;flex-direction:column;min-width:0}
.msg.user .msg-inner{align-items:flex-end}
.mname{font-size:9.5px;font-weight:700;letter-spacing:.5px;margin-bottom:3px;font-family:'Syne',sans-serif;text-transform:uppercase}
.msg.ai .mname{color:var(--ab)}
.msg.user .mname{color:var(--text3)}
.bubble{padding:10px 13px;border-radius:13px;font-size:13.5px;line-height:1.65;word-break:break-word;overflow-wrap:anywhere}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 13px 13px 13px}
.msg.user .bubble{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(167,139,250,.12));border:1px solid rgba(59,130,246,.25);border-radius:13px 4px 13px 13px}
.bubble pre{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:10px;margin:7px 0;overflow-x:auto;font-size:12px;line-height:1.55;font-family:'Courier New',monospace}
.bubble code{background:rgba(255,255,255,.08);padding:2px 5px;border-radius:4px;font-family:'Courier New',monospace;font-size:12px}
.bubble pre code{background:transparent;padding:0}
.bubble strong{color:var(--ab);font-weight:600}
.bubble em{color:var(--a2)}
.gen-img{max-width:100%;max-width:280px;border-radius:12px;border:1px solid var(--border);margin-top:6px;display:block}
.vision-thumb{max-width:160px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;display:block}
.speak-btn{background:none;border:none;cursor:pointer;font-size:13px;margin-top:5px;opacity:.45;transition:.2s;padding:2px 4px;border-radius:6px}
.speak-btn:hover{opacity:1;background:var(--surface2)}

/* TYPING */
.tdots{display:flex;gap:5px;align-items:center;padding:8px 12px}
.tdot{width:7px;height:7px;border-radius:50%;animation:tb 1.2s ease-in-out infinite}
.tdot:nth-child(1){background:var(--accent)}
.tdot:nth-child(2){background:var(--a2);animation-delay:.2s}
.tdot:nth-child(3){background:var(--a3);animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-7px);opacity:1}}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;text-align:center;padding:20px 14px}
.wicon{font-size:44px;filter:drop-shadow(0 0 18px rgba(59,130,246,.45));animation:floatIcon 3.5s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.welcome h2{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:var(--text3);font-size:12.5px;max-width:290px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:4px;max-width:320px}
.chip{padding:6px 12px;border-radius:30px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:11.5px;cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif;-webkit-user-select:none}
.chip:active{background:var(--surface2);color:var(--text);transform:scale(.96)}

/* QUICK BAR */
.quick-bar{display:flex;gap:6px;padding:7px 12px;border-top:1px solid var(--border);background:rgba(7,9,15,.6);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.quick-bar::-webkit-scrollbar{display:none}
.qbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:.15s;flex-shrink:0}
.qbtn:active,.qbtn:hover{background:var(--surface3);color:var(--text)}

/* IMAGE PREVIEW BAR */
.img-preview-bar{display:none;padding:5px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.img-preview-inner{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.img-preview-inner img{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
.rm-img{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}

/* INPUT */
.input-area{padding:8px 11px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));background:rgba(7,9,15,.94);backdrop-filter:blur(24px);border-top:1px solid var(--border);flex-shrink:0}
.light .input-area{background:rgba(240,244,255,.97)}
.irow{display:flex;align-items:flex-end;gap:6px;max-width:760px;margin:0 auto}
.ibox{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;resize:none;min-height:44px;max-height:110px;line-height:1.5;transition:border-color .2s,box-shadow .2s;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ibox::placeholder{color:var(--text3)}
.ibox:focus{border-color:rgba(59,130,246,.4);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.ibtns{display:flex;gap:5px;flex-shrink:0}
.ibtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text2);transition:.15s;flex-shrink:0}
.ibtn:active{transform:scale(.92)}
.mic-on{background:rgba(239,68,68,.15)!important;border-color:rgba(239,68,68,.5)!important;color:#ef4444!important;animation:mp 1s ease-in-out infinite}
@keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.send-btn{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--a2));border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;transition:.15s;box-shadow:0 3px 12px rgba(59,130,246,.35);flex-shrink:0}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.ifooter{text-align:center;margin-top:4px;font-size:10px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:8px}
.vstat{color:#ef4444;display:none}
.vstat.show{display:inline}

/* SETTINGS */
.set-panel{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.set-sec{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.set-title{padding:10px 14px 8px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);gap:12px}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:13px;font-weight:500}
.set-sub{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{width:42px;height:23px;border-radius:12px;background:var(--surface3);border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle::after{content:'';position:absolute;width:17px;height:17px;border-radius:50%;background:white;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on{background:var(--accent)}
.toggle.on::after{transform:translateX(19px)}
.set-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;max-width:160px}
.arrow-row{cursor:pointer}
.arrow-row:hover{background:var(--surface2)}
.arrow-ico{color:var(--text3);font-size:18px;flex-shrink:0}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:580px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;animation:modalIn .25s cubic-bezier(.34,1.4,.64,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.modal-close:hover{background:var(--surface2)}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}

/* THEME GRID */
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
.tcard{border-radius:12px;cursor:pointer;overflow:hidden;border:2px solid transparent;transition:all .2s;aspect-ratio:16/9;position:relative;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.tcard.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.3)}
.tcard:active{transform:scale(.95)}
.tcard-label{position:absolute;bottom:0;left:0;right:0;padding:6px 8px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);font-size:10px;font-weight:700;color:white;font-family:'Syne',sans-serif;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.tcard-check{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:10px;color:white}
.tcard.sel .tcard-check{display:flex}

/* STYLE OPTS */
.sopt{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:.14s}
.sopt:last-child{border-bottom:none}
.sopt:active,.sopt:hover{background:var(--surface2)}
.sopt.sel{background:rgba(59,130,246,.06)}
.sopt-icon{font-size:20px;width:26px;text-align:center;flex-shrink:0}
.sopt-name{font-size:13px;font-weight:600}
.sopt-desc{font-size:11px;color:var(--text3);margin-top:1px}
.sopt-chk{width:18px;height:18px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:9px;color:white;flex-shrink:0;margin-left:auto}

let phraseIdx=0;
function rotatePhrases(){
  const el=document.getElementById('obPhrase');
  if(!el) return;
  el.style.opacity=0;
  setTimeout(()=>{
    phraseIdx=(phraseIdx+1)%PHRASES.length;
    el.textContent=PHRASES[phraseIdx];
    el.style.opacity=1;
  },400);
}
setInterval(rotatePhrases,3000);

  CFG.userName=name; saveCFG();
  document.getElementById('onboard').style.animation='fadeOut .5s forwards';
  setTimeout(()=>{
    document.getElementById('onboard').style.display='none';
    document.getElementById('appShell').style.display='flex';
    isFirstLogin ? initAppFirst() : initApp();
  },500);
}
// Check if returning user
window.addEventListener('load',()=>{
  if(CFG.userName){
    document.getElementById('onboard').style.display='none';
    document.getElementById('appShell').style.display='flex';

});

style.textContent='@keyframes fadeOut{to{opacity:0;transform:scale(1.05)}}';

};

function applyTheme(){
  document.body.classList.toggle('light',CFG.theme==='light');
  const t=THEMES[CFG.chatTheme]||THEMES.default;
  const root=document.documentElement;
  THEME_KEYS.forEach(()=>{});
  // Reset CSS vars
  ['--bg','--surface','--surface2','--accent','--ab','--a2','--text','--text2','--text3','--border'].forEach(v=>root.style.removeProperty(v));
  if(t.css) t.css.split(';').forEach(p=>{const[k,v]=p.split(':');if(k&&v)root.style.setProperty(k.trim(),v.trim());});
  const layer=document.getElementById('bgLayer');
  if(layer){
    let s='';
    if(t.bg) s+=`background:${t.bg};`;
    if(t.pattern) s+=`background-image:${t.pattern.split(';background-size')[0]};`;
    const bsMatch=t.pattern?.match(/;background-size:(.+)/);
    if(bsMatch) s+=`background-size:${bsMatch[1]};`;
    layer.style.cssText=s;
  }
}

function fmtText(t){
  t=t.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${esc(c.trim())}</code></pre>`);
  t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.*?)\*/g,'<em>$1</em>');
  t=t.replace(/\n/g,'<br>');
  return t;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── IMAGE GENERATION ──
const IMG_KW=['fotoğraf','görsel','resim','çizim','oluştur','yap','çiz','üret','illüstrasyon','tasarla'];
const IMG_OBJ=['araba','kedi','köpek','at','kuş','ev','ağaç','dağ','deniz','uzay','insan','hayvan','manzara','çiçek','şehir','robot','ejderha','orman','göl','şelale','aslan','kaplan','balık','ay','güneş','yıldız','köprü','bulut','volkan','ada'];
const isImgReq=t=>IMG_KW.some(k=>t.toLowerCase().includes(k))&&(cur==='gorsel'||IMG_OBJ.some(k=>t.toLowerCase().includes(k)));

async function generateImage(text){
  // Translate to English
  try{
    const tr=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        max_tokens:80,
        system:'You are a translator. Translate the following Turkish text to English for AI image generation. Return ONLY the English prompt, concise and descriptive, nothing else.',
        messages:[{role:'user',content:text}]
      })
    });
    const td=await tr.json();
    let eng=((td.content?.[0]?.text)||text).trim().replace(/^["']|["']$/g,'').replace(/\.$/, '');
    if(!eng||eng.length<3) eng=text;
    const prompt=eng+', high quality, detailed, digital art, vibrant colors, professional illustration';
    const encoded=encodeURIComponent(prompt);
    const seed=Math.floor(Math.random()*999999);
    return {
      url:`https://image.pollinations.ai/prompt/${encoded}?width=512&height=512&nologo=true&nofeed=true&seed=${seed}`,
      prompt:eng
    };
  }catch(e){
    const encoded=encodeURIComponent(text+', high quality digital art');
    const seed=Math.floor(Math.random()*999999);
    return {url:`https://image.pollinations.ai/prompt/${encoded}?width=512&height=512&nologo=true&seed=${seed}`,prompt:text};
  }
}

async function doSend(){
  if(loading||cur==='ayarlar')return;
  const inp=document.getElementById('ibox');
  const text=inp.value.trim();
  if(!text&&!uploadedImg)return;

  // Küsme kontrolü
  if(hakaret(text)){
    kusmeSon=Date.now();
    inp.value=''; inp.style.height='auto';
    document.getElementById('welcome')?.remove();
    const msgs=document.getElementById('messages');
    // Kullanıcı mesajı göster
    const ud=document.createElement('div');
    ud.className='msg user';
    const initials=(CFG.userName||'K')[0].toUpperCase();
    ud.innerHTML=`<div class="avatar">${initials}</div><div class="msg-inner"><div class="mname" style="color:var(--text3)">${CFG.userName||'Sen'}</div><div class="bubble">${esc(text)}</div></div>`;
    msgs.appendChild(ud); msgs.scrollTop=99999;
    // Küsme mesajı
    const kd=document.createElement('div');
    kd.className='msg ai';
    kd.innerHTML=`<div class="avatar">🥔</div><div class="msg-inner"><div class="mname">Kumpir AI</div><div class="bubble" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2)">😤 Bu tür konuşmayı uygun bulmuyorum. 5 dakika boyunca cevap vermeyeceğim. Lütfen saygılı konuş.</div></div>`;
    msgs.appendChild(kd); msgs.scrollTop=99999;
    return;
  }

  // 5 dakika küsme süresi kontrolü
  if(kusmeSon && (Date.now()-kusmeSon) < 5*60*1000){
    const kalanSn=Math.ceil((5*60*1000-(Date.now()-kusmeSon))/1000);
    const kalanDk=Math.floor(kalanSn/60);
    const kalanS=kalanSn%60;
    inp.value=''; inp.style.height='auto';
    const msgs=document.getElementById('messages');
    const kd=document.createElement('div');
    kd.className='msg ai';
    kd.innerHTML=`<div class="avatar">🥔</div><div class="msg-inner"><div class="mname">Kumpir AI</div><div class="bubble" style="background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.15)">😤 Hâlâ küsüğüm. ${kalanDk > 0 ? kalanDk+'dk ' : ''}${kalanS}sn sonra konuşabiliriz.</div></div>`;
    msgs.appendChild(kd); msgs.scrollTop=99999;
    return;
  }
  if(kusmeSon && (Date.now()-kusmeSon) >= 5*60*1000) kusmeSon=0;

  inp.value='';inp.style.height='auto';
  loading=true;
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('welcome')?.remove();

  const msgs=document.getElementById('messages');
  const ud=document.createElement('div');
  ud.className='msg user';
  const initials=(CFG.userName||'K')[0].toUpperCase();
  const thumbHtml=uploadedImg?`<img src="${uploadedImg.dataUrl}" class="vision-thumb">`:'' ;
  ud.innerHTML=`<div class="avatar">${initials}</div><div class="msg-inner"><div class="mname" style="color:var(--text3)">${CFG.userName||'Sen'}</div><div class="bubble">${thumbHtml}${text?esc(text):''}</div></div>`;
  msgs.appendChild(ud);msgs.scrollTop=99999;

  if(!hist[cur])hist[cur]=[];
  hist[cur].push({role:'user',content:text||'(Görsel paylaşıldı)',thumb:uploadedImg?.dataUrl});
  showTyping();

  // Vision
  if(uploadedImg){
    const img={...uploadedImg};
    removeImg();
    try{
      const r=await fetch('/api/vision',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          imageBase64:img.base64,mimeType:img.mimeType,
          question:text||`Bu görseli ${un()} için Türkçe olarak detaylıca açıkla.`,
          system:`Sen Kumpir adında bir yapay zeka asistanısın. SADECE TÜRKÇE konuş. Kullanıcı adı ${un()}. Görseli analiz et ve Türkçe açıkla. ${STYLES[CFG.style].p}`
        })
      });
      const data=await r.json();
      removeTyping();
      const reply=data.content?.[0]?.text||'Görseli analiz edemedim.';
      hist[cur].push({role:'ai',content:reply});
      renderMsg('ai',reply);
      if(CFG.tts)speakText(reply);
    }catch(e){removeTyping();renderMsg('ai','Görsel analiz hatası: '+e.message);}
    loading=false;document.getElementById('sendBtn').disabled=false;
    return;
  }

  // Image generation
  if(isImgReq(text)){
    try{
      const {url,prompt}=await generateImage(text);
      removeTyping();
      hist[cur].push({type:'img',url,prompt});
      renderImg(url,prompt);
    }catch(e){removeTyping();renderMsg('ai','Görsel hatası: '+e.message);}
    loading=false;document.getElementById('sendBtn').disabled=false;
    return;
  }

  // Normal chat
  const sec=SECS[cur];
  try{
    const apiMsgs=(hist[cur]||[]).slice(-14).filter(m=>m.role).map(m=>({
      role:m.role==='ai'?'assistant':'user',
      content:typeof m.content==='string'?m.content:'(görsel paylaşıldı)'
    }));
    const r=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({max_tokens:600,system:sec.sys(),messages:apiMsgs})
    });
    const data=await r.json();
    removeTyping();
    const reply=data.content?.[0]?.text||'Bir sorun oluştu.';
    hist[cur].push({role:'ai',content:reply});
    renderMsg('ai',reply);
    if(CFG.tts)speakText(reply);
  }catch(e){removeTyping();renderMsg('ai','Bağlantı hatası: '+e.message);}
  loading=false;document.getElementById('sendBtn').disabled=false;
}

// ── TTS ──
function speakText(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const clean=text.replace(/<[^>]+>/g,'').replace(/[*`#_]/g,'');
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='tr-TR';u.rate=CFG.ttsRate||1;
  const voices=window.speechSynthesis.getVoices();
  const trV=voices.filter(v=>v.lang.startsWith('tr'));
  if(trV.length>0){
    const pref=CFG.ttsVoice==='male'?trV.find(v=>/male|erkek/i.test(v.name)):trV.find(v=>/female|kadın/i.test(v.name));
    u.voice=pref||trV[0];
  }
  window.speechSynthesis.speak(u);
}
function speakBtn(btn,encoded){
  const text=decodeURIComponent(encoded);
  if(window.speechSynthesis?.speaking){window.speechSynthesis.cancel();return;}
  speakText(text);
}

// ── MIC ──
function toggleMic(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Sesli giriş için Chrome kullan!');return;}
  if(listening){recog?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.lang='tr-TR';recog.continuous=false;recog.interimResults=true;
  const mb=document.getElementById('micBtn');
  recog.onstart=()=>{listening=true;mb.classList.add('mic-on');mb.textContent='⏹️';document.getElementById('vstat').classList.add('show');};
  recog.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join('');document.getElementById('ibox').value=t;autoResize(document.getElementById('ibox'));};
  recog.onend=()=>{listening=false;mb.classList.remove('mic-on');mb.textContent='🎤';document.getElementById('vstat').classList.remove('show');const v=document.getElementById('ibox').value.trim();if(v)doSend();};
  recog.onerror=()=>{listening=false;mb.classList.remove('mic-on');mb.textContent='🎤';document.getElementById('vstat').classList.remove('show');};
  recog.start();
}

    <div style="border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span style="font-size:12.5px;color:var(--text2)">⏩ Hız</span>
      <select class="set-select" onchange="CFG.ttsRate=parseFloat(this.value);saveCFG()">
        <option value="0.7" ${CFG.ttsRate==0.7?'selected':''}>Yavaş</option>
        <option value="1" ${CFG.ttsRate==1?'selected':''}>Normal</option>
        <option value="1.3" ${CFG.ttsRate==1.3?'selected':''}>Hızlı</option>
        <option value="1.6" ${CFG.ttsRate==1.6?'selected':''}>Çok Hızlı</option>
      </select>
    </div>
  </div>

  <!-- KONUŞMA TARZI -->
  <div onclick="openModal('style')" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:.15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='var(--surface)'">
    <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(167,139,250,.2),rgba(236,72,153,.1));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${s?.icon||'😊'}</div>
    <div style="flex:1">
      <div style="font-size:13.5px;font-weight:600">Konuşma Tarzı</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${s?.name||'Normal'} — ${s?.desc||'Dengeli ve samimi'}</div>
    </div>
    <div style="color:var(--text3);font-size:20px;flex-shrink:0">›</div>
  </div>

  <!-- TEHLİKELİ BUTONLAR -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden">
    <div style="padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:13px;font-weight:500">🗑️ Sohbet Geçmişini Temizle</div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px">Tüm konuşmalar silinir</div>
      </div>
      <button onclick="clearHistory()" style="padding:6px 14px;border-radius:20px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.1);color:#ef4444;cursor:pointer;font-size:12px;white-space:nowrap">Temizle</button>
    </div>
    <div style="padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div>
        <div style="font-size:13px;font-weight:500">🔄 Hesabı Sıfırla</div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px">İsim ve tüm ayarlar sıfırlanır</div>
      </div>
      <button onclick="resetAll()" style="padding:6px 14px;border-radius:20px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.1);color:#ef4444;cursor:pointer;font-size:12px;white-space:nowrap">Sıfırla</button>
    </div>
  </div>

  <!-- HAKKINDA -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden">
    <div style="padding:10px 14px;font-family:Syne,sans-serif;font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)">Hakkında</div>
    <div style="padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)">
      <span style="font-size:22px">🥔</span>
      <div><div style="font-size:13px;font-weight:600">Kumpir AI</div><div style="font-size:11px;color:var(--text3)">Enes tarafından oluşturuldu</div></div>
    </div>
    <div style="padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)">
      <span style="font-size:22px">🤖</span>
      <div><div style="font-size:13px;font-weight:600">Dil Modeli</div><div style="font-size:11px;color:var(--text3)">Groq · Llama 3.3 70B</div></div>
    </div>
    <div style="padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)">
      <span style="font-size:22px">🎨</span>
      <div><div style="font-size:13px;font-weight:600">Görsel Üretim</div><div style="font-size:11px;color:var(--text3)">Pollinations AI (ücretsiz)</div></div>
    </div>
    <div style="padding:12px 16px;display:flex;align-items:center;gap:12px">
      <span style="font-size:22px">🌐</span>
      <div><div style="font-size:13px;font-weight:600">Sunucu</div><div style="font-size:11px;color:var(--text3)">Railway · Her zaman açık</div></div>
    </div>
  </div>

  </div>
</div>`;
}

function changeName(){
  const n=prompt('Yeni adını gir:',CFG.userName);
  if(n&&n.trim()){CFG.userName=n.trim();saveCFG();sw(document.querySelector('[data-s=ayarlar]'));}
}
function clearHistory(){if(confirm('Tüm sohbet geçmişi silinsin mi?')){Object.keys(SECS).forEach(s=>hist[s]=[]);sw(document.querySelector('.sbtn.active'));}}
function resetAll(){if(confirm('Tüm ayarlar sıfırlansın mı?')){localStorage.removeItem('kumpir_cfg');location.reload();}}
function toggleTheme(){CFG.theme=CFG.theme==='dark'?'light':'dark';saveCFG();applyTheme();document.getElementById('thTgl')?.classList.toggle('on',CFG.theme==='dark');}
function toggleTTS(){CFG.tts=!CFG.tts;saveCFG();document.getElementById('ttsTgl')?.classList.toggle('on',CFG.tts);}
function selStyle(k){CFG.style=k;saveCFG();closeModal();sw(document.querySelector('[data-s=ayarlar]'));}
function selectTheme(k){CFG.chatTheme=k;saveCFG();applyTheme();closeModal();sw(document.querySelector('[data-s=ayarlar]'));}

// ── MODAL ──
function openModal(type){
  const title=document.getElementById('modalTitle');
  const body=document.getElementById('modalBody');

  if(type==='themes'){
    title.textContent='🎨 Sohbet Temaları';
    const cards=THEME_KEYS.map(k=>{
      const bg=THEME_PREVIEW[k]||'#07090f';
      const acc=THEME_ACCENT[k]||'#3b82f6';
      const t=THEMES[k];
      let patStyle='';
      if(t.pattern){
        const p=t.pattern.split(';background-size')[0];
        patStyle=`background-image:${p};`;
        const bsM=t.pattern.match(/;background-size:(.+)/);
        if(bsM) patStyle+=`background-size:${bsM[1]};`;
      }
      return `<div onclick="selectTheme('${k}')" class="tcard ${CFG.chatTheme===k?'sel':''}" style="background:${bg};${patStyle}">
        <div class="tcard-check">✓</div>
        <div class="tcard-label">${t.name}</div>
        <div style="position:absolute;top:8px;left:8px;width:20px;height:3px;border-radius:2px;background:${acc}"></div>
      </div>`;
    }).join('');
    body.innerHTML=`<div class="theme-grid">${cards}</div>`;
  } else if(type==='style'){
    title.textContent='💬 Konuşma Tarzı';
    body.innerHTML=Object.entries(STYLES).map(([k,s])=>`
      <div class="sopt ${CFG.style===k?'sel':''}" onclick="selStyle('${k}')">
        <div class="sopt-icon">${s.icon}</div>
        <div><div class="sopt-name">${s.name}</div><div class="sopt-desc">${s.desc}</div></div>
        <div class="sopt-chk">✓</div>
      </div>`).join('');
  } else if(type==='tts'){
    title.textContent='🔊 Ses Ayarları';
    body.innerHTML=`<div style="padding:8px 0">
      <div class="sopt" style="cursor:default">
        <div><div class="sopt-name">Sesli Okuma</div><div class="sopt-desc">Kumpir cevaplarını okur</div></div>
        <button class="toggle ${CFG.tts?'on':''}" onclick="CFG.tts=!CFG.tts;saveCFG();this.classList.toggle('on',CFG.tts)"></button>
      </div>
      <div class="sopt" style="cursor:default">
        <div class="sopt-name" style="flex:1">Cinsiyet</div>
        <select class="set-select" onchange="CFG.ttsVoice=this.value;saveCFG()">
          <option value="female" ${CFG.ttsVoice==='female'?'selected':''}>Kadın</option>
          <option value="male" ${CFG.ttsVoice==='male'?'selected':''}>Erkek</option>
        </select>
      </div>
      <div class="sopt" style="cursor:default">
        <div class="sopt-name" style="flex:1">Hız</div>
        <select class="set-select" onchange="CFG.ttsRate=parseFloat(this.value);saveCFG()">
          <option value="0.7" ${CFG.ttsRate==0.7?'selected':''}>Yavaş</option>
          <option value="1" ${CFG.ttsRate==1?'selected':''}>Normal</option>
          <option value="1.3" ${CFG.ttsRate==1.3?'selected':''}>Hızlı</option>
          <option value="1.6" ${CFG.ttsRate==1.6?'selected':''}>Çok Hızlı</option>
        </select>
      </div>
    </div>`;
  }
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function closeModalOut(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

function sendChip(el){document.getElementById('ibox').value=el.textContent;doSend();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}

window.speechSynthesis?.getVoices();
if(window.visualViewport){window.visualViewport.addEventListener('resize',()=>{document.body.style.height=window.visualViewport.height+'px';});}
</script>
</body>
</html>
